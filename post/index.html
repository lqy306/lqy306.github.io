<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts | Leo Lee</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Fragment+Mono&display=swap');

:root {
    --bg-primary: #0a0a0a;
    --bg-secondary: #141414;
    --bg-tertiary: #1c1c1c;
    --text-primary: #ffffff;
    --text-secondary: #a0a0a0;
    --text-tertiary: #666666;
    --accent: #d4a574;
    --border: rgba(255, 255, 255, 0.08);
}

body {
    font-family: 'DM Sans', sans-serif;
    background-color: var(--bg-primary);
    color: var(--text-primary);
    padding: 40px 24px;
    line-height: 1.6;
    margin: 0;
}

.container {
    max-width: 1000px;
    margin: 0 auto;
}

h1 {
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
    color: var(--text-primary);
}

.path-info {
    font-family: 'Fragment Mono', monospace;
    font-size: 13px;
    color: var(--text-tertiary);
    margin-bottom: 32px;
}

a {
    color: var(--text-secondary);
    text-decoration: none;
    transition: all 0.2s ease;
}

a:hover {
    color: var(--accent);
}

.nav-links {
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
}

.nav-links a {
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.table-container {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    text-align: left;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
}

th {
    font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.05em;
    background: var(--bg-tertiary);
}

tr:last-child td {
    border-bottom: none;
}

tr:hover {
    background-color: var(--bg-tertiary);
}

.file-name {
    display: flex;
    align-items: center;
    gap: 12px;
}

.file-icon {
    font-size: 16px;
}

.footer {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-tertiary);
    text-align: center;
    font-family: 'Fragment Mono', monospace;
}
</style>
</head>
<body>
    <div class="container">
        <div class="nav-links">
            <a href="https://lqy306.github.io">🏠 Back to Home</a>
        </div>
        <h1>Blog Posts</h1>
        <p class="path-info">Writing & Thoughts</p>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Date</th>
                        <th>Size</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td><a href="hello-world/"><span class="file-icon">📝</span> Hello World</a></td><td>2026-06-05</td><td>-</td></tr>
                </tbody>
            </table>
        </div>
        <div class="footer">
            Generated by Auto-Blog Script | Arch Linux Spirit
        </div>
    </div>
</body>
</html>
