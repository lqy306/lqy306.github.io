<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源分享 | Leo Lee</title>
    <meta name="description" content="资源分享页面">
    
    <style>@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

/* ── Self-hosted font: F1.8 (SIL OFL 1.1) ── */
@font-face {
    font-family: 'F1.8';
    src: url('/fonts/F1.8-Regular.woff2') format('woff2'),
         url('/fonts/F1.8-Regular.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
}

/* ═══════════════════════════════════════════════
   Theme Variables
   ═══════════════════════════════════════════════ */
:root {
    --clr-black: #34322D;
    --clr-gray: #F8F8F8;
    --clr-white: #FFFFFF;
    --clr-accent: #1793d1;
    --clr-accent-light: rgba(23, 147, 209, 0.08);
    --clr-accent-glow: rgba(23, 147, 209, 0.2);
    --clr-border: rgba(52, 50, 45, 0.1);
    --clr-border-hover: rgba(52, 50, 45, 0.2);

    --body-bg: var(--clr-white);
    --surface-bg: var(--clr-gray);
    --nav-bg: rgba(255, 255, 255, 0.92);
    --card-bg: rgba(248, 248, 248, 0.55);
    --card-bg-hover: rgba(248, 248, 248, 1);

    --text-primary: var(--clr-black);
    --text-secondary: #666;
    --text-muted: #999;
    --text-on-accent: var(--clr-white);

    --footer-bg: var(--clr-black);
    --footer-text: var(--clr-gray);

    --code-bg: var(--clr-black);
    --code-text: var(--clr-accent);
    --pre-bg: var(--clr-black);
    --pre-text: var(--clr-gray);

    --post-bg: rgba(248, 248, 248, 0.55);
    --table-bg: rgba(248, 248, 248, 0.55);
    --breadcrumb-bg: var(--clr-accent-light);
}

[data-theme="dark"] {
    --clr-black: #E8E6E3;
    --clr-gray: #1b1b2f;
    --clr-white: #121212;
    --clr-accent: #4FC3F7;
    --clr-accent-light: rgba(79, 195, 247, 0.10);
    --clr-accent-glow: rgba(79, 195, 247, 0.20);
    --clr-border: rgba(232, 230, 227, 0.08);
    --clr-border-hover: rgba(232, 230, 227, 0.18);

    --body-bg: #121212;
    --surface-bg: #1b1b2f;
    --nav-bg: rgba(18, 18, 18, 0.92);
    --card-bg: rgba(27, 27, 47, 0.55);
    --card-bg-hover: rgba(27, 27, 47, 1);

    --text-primary: #E8E6E3;
    --text-secondary: #A0A0A0;
    --text-muted: #686868;
    --text-on-accent: #121212;

    --footer-bg: #0b0b17;
    --footer-text: #A0A0A0;

    --code-bg: #0d0d1a;
    --code-text: var(--clr-accent);
    --pre-bg: #0d0d1a;
    --pre-text: #E8E6E3;

    --post-bg: rgba(27, 27, 47, 0.55);
    --table-bg: rgba(27, 27, 47, 0.55);
    --breadcrumb-bg: var(--clr-accent-light);
}

/* ═══════════════════════════════════════════════
   Base
   ═══════════════════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
    font-family: 'DM Sans', 'Noto Sans SC', sans-serif;
    background: var(--body-bg);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.3s ease, color 0.3s ease;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
    width: 100%;
}

/* ═══════════════════════════════════════════════
   Navigation
   ═══════════════════════════════════════════════ */
nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: var(--nav-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--clr-border);
    transition: background 0.3s ease, border-color 0.3s ease;
}

.nav-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0.85rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-family: 'F1.8', 'Libre Baskerville', 'Noto Serif SC', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-primary);
    text-decoration: none;
    letter-spacing: -0.02em;
    transition: color 0.3s ease;
}

.nav-links {
    display: flex;
    gap: 1.8rem;
    list-style: none;
    align-items: center;
}

.nav-links a {
    color: var(--text-primary);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: color 0.3s ease;
    position: relative;
}

.nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 2px;
    background: var(--clr-accent);
    transition: width 0.3s ease;
}

.nav-links a:hover { color: var(--clr-accent); }
.nav-links a:hover::after { width: 100%; }

/* Theme Toggle */
.theme-toggle {
    background: none;
    border: 2px solid var(--clr-border);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    color: var(--text-primary);
    transition: all 0.3s ease;
    padding: 0;
    line-height: 1;
}

.theme-toggle:hover {
    border-color: var(--clr-accent);
    color: var(--clr-accent);
    transform: rotate(15deg);
}

/* ═══════════════════════════════════════════════
   Main Content
   ═══════════════════════════════════════════════ */
main {
    flex: 1;
    margin-top: 80px;
}

h1 {
    font-family: 'Libre Baskerville', 'Noto Serif SC', serif;
    font-size: 2.5rem;
    font-weight: 700;
    margin: 2rem 0 1rem;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    padding-bottom: 1rem;
    border-bottom: 3px solid var(--clr-accent);
    transition: color 0.3s ease, border-bottom 0.3s ease;
}

h2, h3, h4, h5, h6 {
    font-family: 'Libre Baskerville', 'Noto Serif SC', serif;
    color: var(--text-primary);
    margin-top: 1.5rem;
    margin-bottom: 0.75rem;
    transition: color 0.3s ease;
}

a {
    color: var(--clr-accent);
    text-decoration: none;
    transition: color 0.3s ease;
}

a:hover { color: var(--text-primary); text-decoration: underline; }

/* Breadcrumb */
.breadcrumb {
    margin-bottom: 2rem;
    padding: 1rem;
    background: var(--breadcrumb-bg);
    border-radius: 8px;
    border-left: 4px solid var(--clr-accent);
    transition: background 0.3s ease, border-left 0.3s ease;
}

.breadcrumb a { margin-right: 0.5rem; }

/* Tables */
table {
    width: 100%;
    border-collapse: collapse;
    margin: 2rem 0;
    background: var(--table-bg);
    border-radius: 8px;
    overflow: hidden;
    transition: background 0.3s ease;
}

thead { background: var(--text-primary); color: var(--body-bg); transition: background 0.3s ease, color 0.3s ease; }

th {
    padding: 1rem;
    text-align: left;
    font-weight: 600;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

td {
    padding: 1rem;
    border-bottom: 1px solid var(--clr-border);
    vertical-align: middle;
    transition: border-color 0.3s ease;
}

tbody tr:hover { background: var(--surface-bg); transition: background 0.3s ease; }
tbody tr:last-child td { border-bottom: none; }

/* Tags */
.tag {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    margin: 0.15rem;
    background: var(--breadcrumb-bg);
    color: var(--clr-accent);
    border-radius: 12px;
    font-size: 0.8rem;
    font-weight: 500;
    transition: all 0.3s ease;
    text-decoration: none;
}

.tag:hover {
    background: var(--clr-accent);
    color: var(--text-on-accent);
    text-decoration: none;
}

.table-info {
    margin-bottom: 2rem;
    padding: 1rem;
    background: var(--breadcrumb-bg);
    border-radius: 8px;
    border-left: 4px solid var(--clr-accent);
    transition: background 0.3s ease, border-left 0.3s ease;
}

.table-info p { margin: 0; color: var(--text-secondary); transition: color 0.3s ease; }
.table-info .count { font-weight: 700; color: var(--clr-accent); }

/* Footer */
footer {
    margin-top: 4rem;
    padding: 2rem;
    background: var(--footer-bg);
    color: var(--footer-text);
    text-align: center;
    transition: background 0.3s ease, color 0.3s ease;
}

footer p { font-size: 0.9rem; margin: 0; }
footer a { color: var(--clr-accent); transition: color 0.3s ease; }
footer a:hover { color: var(--footer-text); }

/* Post Content */
.post-content {
    background: var(--post-bg);
    padding: 2rem;
    border-radius: 12px;
    border: 1px solid var(--clr-border);
    margin: 2rem 0;
    transition: background 0.3s ease, border-color 0.3s ease;
}

.post-content h1, .post-content h2, .post-content h3 {
    color: var(--text-primary);
    margin-top: 1.5em;
    border-bottom: 2px solid var(--clr-accent);
    padding-bottom: 0.5rem;
}

.post-content h1 { font-size: 2rem; }
.post-content h2 { font-size: 1.5rem; }
.post-content h3 { font-size: 1.2rem; }

.post-content img {
    max-width: 100%;
    height: auto;
    border-radius: 8px;
    margin: 1.5rem 0;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.post-content code {
    background: var(--code-bg);
    color: var(--code-text);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 0.9em;
    transition: background 0.3s ease, color 0.3s ease;
}

.post-content pre {
    background: var(--pre-bg);
    color: var(--pre-text);
    padding: 1.5rem;
    border-radius: 8px;
    overflow-x: auto;
    margin: 1.5rem 0;
    border-left: 4px solid var(--clr-accent);
    transition: background 0.3s ease, color 0.3s ease, border-left 0.3s ease;
}

.post-content pre code {
    background: transparent;
    color: inherit;
    padding: 0;
}

.post-content blockquote {
    border-left: 4px solid var(--clr-accent);
    padding-left: 1.5rem;
    margin: 1.5rem 0;
    font-style: italic;
    color: var(--text-secondary);
    transition: color 0.3s ease;
}

.post-content table { margin: 1.5rem 0; }
.post-content ul, .post-content ol { margin: 1.5rem 0 1.5rem 2rem; }
.post-content li { margin-bottom: 0.5rem; }

.post-meta {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 1rem;
    transition: color 0.3s ease;
}

.post-tags { margin-bottom: 2rem; }

/* Resource cards */
.resource-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
    margin: 2rem 0;
}

.resource-card {
    background: var(--card-bg);
    border: 1px solid var(--clr-border);
    border-radius: 12px;
    padding: 1.5rem;
    transition: all 0.3s ease;
    text-decoration: none;
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
}

.resource-card:hover {
    border-color: var(--clr-accent);
    background: var(--card-bg-hover);
    transform: translateY(-4px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.08);
    text-decoration: none;
}

.resource-card .resource-icon {
    font-size: 2rem;
    color: var(--clr-accent);
}

.resource-card .resource-name {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text-primary);
}

.resource-card .resource-desc {
    font-size: 0.9rem;
    color: var(--text-secondary);
    flex: 1;
}

.resource-card .resource-meta {
    font-size: 0.8rem;
    color: var(--text-muted);
    display: flex;
    gap: 1rem;
}

/* 404 Page */
.error-page {
    text-align: center;
    padding: 6rem 2rem;
}

.error-page h1 {
    font-size: 6rem;
    border: none;
    color: var(--clr-accent);
    margin-bottom: 0;
}

.error-page p {
    font-size: 1.2rem;
    color: var(--text-secondary);
    margin: 1.5rem 0;
    transition: color 0.3s ease;
}

/* Archive list */
.archive-list { list-style: none; }

.archive-list li {
    padding: 0.8rem 0;
    border-bottom: 1px solid var(--clr-border);
    display: flex;
    gap: 1.5rem;
    align-items: baseline;
}

.archive-list li:last-child { border-bottom: none; }

.archive-date {
    font-size: 0.85rem;
    color: var(--text-muted);
    white-space: nowrap;
    min-width: 6em;
}

.archive-title {
    font-size: 1.05rem;
    font-weight: 500;
}

/* Responsive */
@media (max-width: 768px) {
    .container { padding: 1rem; }
    h1 { font-size: 1.8rem; }
    .nav-links { display: none; }
    table { font-size: 0.9rem; }
    th, td { padding: 0.75rem; }
    .resource-grid { grid-template-columns: 1fr; }
    .archive-list li { flex-direction: column; gap: 0.3rem; }
    .archive-date { min-width: auto; }
    .error-page h1 { font-size: 4rem; }
}

@media (max-width: 480px) {
    .nav-container { padding: 0.85rem 1rem; }
    .logo { font-size: 1.2rem; }
}

/* Print */
@media print {
    nav { display: none; }
    main { margin-top: 0; }
}
</style>
</head>

        <div class="nav-container">

                    <button class="theme-toggle" id="theme-toggle" aria-label="切换主题">

            </ul>

    </nav>
    <main>

<script>
(function() {
    var toggle = document.getElementById('theme-toggle');
    if (!toggle) return;
    var icon = document.getElementById('theme-icon');
    var html = document.documentElement;
    var saved = localStorage.getItem('theme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    var theme = saved || (prefersDark ? 'dark' : 'light');
    html.setAttribute('data-theme', theme);
    if (icon) icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    toggle.addEventListener('click', function() {
        var current = html.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        if (icon) icon.className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    });
})();
</script>
