<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签: hello | Leo Lee</title>
    <meta name="description" content="标签 #hello 下的文章">
    <style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

:root {
    --color-black: #34322D;
    --color-gray: #F8F8F8;
    --color-white: #FFFFFF;
    --color-accent: #1793d1;
    --color-accent-light: rgba(23, 147, 209, 0.08);
    --color-border: rgba(52, 50, 45, 0.1);
    --font-serif: 'Libre Baskerville', 'Noto Serif SC', serif;
    --font-sans: 'DM Sans', 'Noto Sans SC', sans-serif;
    --max-width: 1200px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
    font-family: var(--font-sans);
    background: var(--color-white);
    color: var(--color-black);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.container {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 2rem;
    width: 100%;
}

/* Navigation */
nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--color-border);
}

.nav-container {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 0.8rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-family: var(--font-serif);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--color-black);
    text-decoration: none;
    letter-spacing: -0.02em;
}

.nav-links {
    display: flex;
    gap: 1.8rem;
    list-style: none;
    align-items: center;
}

.nav-links a {
    color: var(--color-black);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: color 0.3s ease;
    position: relative;
}

.nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 2px;
    background: var(--color-accent);
    transition: width 0.3s ease;
}

.nav-links a:hover { color: var(--color-accent); }
.nav-links a:hover::after { width: 100%; }

/* Main content */
main {
    flex: 1;
    margin-top: 80px;
}

h1 {
    font-family: var(--font-serif);
    font-size: 2.5rem;
    font-weight: 700;
    margin: 2rem 0 1rem;
    color: var(--color-black);
    letter-spacing: -0.02em;
    padding-bottom: 1rem;
    border-bottom: 3px solid var(--color-accent);
}

h2, h3, h4, h5, h6 {
    font-family: var(--font-serif);
    color: var(--color-black);
    margin-top: 1.5rem;
    margin-bottom: 0.75rem;
}

a {
    color: var(--color-accent);
    text-decoration: none;
    transition: color 0.3s ease;
}

a:hover { color: var(--color-black); text-decoration: underline; }

/* Breadcrumb */
.breadcrumb {
    margin-bottom: 2rem;
    padding: 1rem;
    background: var(--color-accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--color-accent);
}

.breadcrumb a { margin-right: 0.5rem; }

/* Tables */
table {
    width: 100%;
    border-collapse: collapse;
    margin: 2rem 0;
    background: rgba(248,248,248,0.6);
    border-radius: 8px;
    overflow: hidden;
}

thead { background: var(--color-black); color: var(--color-white); }

th {
    padding: 1rem;
    text-align: left;
    font-weight: 600;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

td {
    padding: 1rem;
    border-bottom: 1px solid var(--color-border);
    vertical-align: middle;
}

tbody tr:hover { background: rgba(248,248,248,1); }
tbody tr:last-child td { border-bottom: none; }

/* Tags */
.tag {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    margin: 0.15rem;
    background: var(--color-accent-light);
    color: var(--color-accent);
    border-radius: 12px;
    font-size: 0.8rem;
    font-weight: 500;
    transition: all 0.3s ease;
    text-decoration: none;
}

.tag:hover {
    background: var(--color-accent);
    color: var(--color-white);
    text-decoration: none;
}

.table-info {
    margin-bottom: 2rem;
    padding: 1rem;
    background: var(--color-accent-light);
    border-radius: 8px;
    border-left: 4px solid var(--color-accent);
}

.table-info p { margin: 0; color: #666; }
.table-info .count { font-weight: 700; color: var(--color-accent); }

/* Footer */
footer {
    margin-top: 4rem;
    padding: 2rem;
    background: var(--color-black);
    color: var(--color-gray);
    text-align: center;
}

footer p { font-size: 0.9rem; }
footer a { color: var(--color-accent); }
footer a:hover { color: var(--color-gray); }

/* Post content */
.post-content {
    background: rgba(248,248,248,0.6);
    padding: 2rem;
    border-radius: 12px;
    border: 1px solid var(--color-border);
    margin: 2rem 0;
}

.post-content h1, .post-content h2, .post-content h3 {
    color: var(--color-black);
    margin-top: 1.5em;
    border-bottom: 2px solid var(--color-accent);
    padding-bottom: 0.5rem;
}

.post-content h1 { font-size: 2rem; }
.post-content h2 { font-size: 1.5rem; }
.post-content h3 { font-size: 1.2rem; }

.post-content img {
    max-width: 100%;
    height: auto;
    border-radius: 8px;
    margin: 1.5rem 0;
    box-shadow: 0 10px 30px rgba(52,50,45,0.1);
}

.post-content code {
    background: var(--color-black);
    color: var(--color-accent);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 0.9em;
}

.post-content pre {
    background: var(--color-black);
    color: var(--color-gray);
    padding: 1.5rem;
    border-radius: 8px;
    overflow-x: auto;
    margin: 1.5rem 0;
    border-left: 4px solid var(--color-accent);
}

.post-content pre code {
    background: transparent;
    color: inherit;
    padding: 0;
}

.post-content blockquote {
    border-left: 4px solid var(--color-accent);
    padding-left: 1.5rem;
    margin: 1.5rem 0;
    font-style: italic;
    color: #666;
}

.post-content table { margin: 1.5rem 0; }
.post-content ul, .post-content ol { margin: 1.5rem 0 1.5rem 2rem; }
.post-content li { margin-bottom: 0.5rem; }

.post-meta {
    font-size: 0.9rem;
    color: #999;
    margin-bottom: 1rem;
}

.post-tags { margin-bottom: 2rem; }

/* Resource cards */
.resource-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
    margin: 2rem 0;
}

.resource-card {
    background: rgba(248,248,248,0.6);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 1.5rem;
    transition: all 0.3s ease;
    text-decoration: none;
    color: var(--color-black);
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
}

.resource-card:hover {
    border-color: var(--color-accent);
    background: rgba(248,248,248,1);
    transform: translateY(-4px);
    box-shadow: 0 15px 30px rgba(52,50,45,0.08);
    text-decoration: none;
}

.resource-card .resource-icon {
    font-size: 2rem;
    color: var(--color-accent);
}

.resource-card .resource-name {
    font-size: 1.2rem;
    font-weight: 700;
}

.resource-card .resource-desc {
    font-size: 0.9rem;
    color: #666;
    flex: 1;
}

.resource-card .resource-meta {
    font-size: 0.8rem;
    color: #999;
    display: flex;
    gap: 1rem;
}

/* 404 Page */
.error-page {
    text-align: center;
    padding: 6rem 2rem;
}

.error-page h1 {
    font-size: 6rem;
    border: none;
    color: var(--color-accent);
    margin-bottom: 0;
}

.error-page p {
    font-size: 1.2rem;
    color: #666;
    margin: 1.5rem 0;
}

/* Archive timeline */
.archive-list {
    list-style: none;
}

.archive-list li {
    padding: 0.8rem 0;
    border-bottom: 1px solid var(--color-border);
    display: flex;
    gap: 1.5rem;
    align-items: baseline;
}

.archive-list li:last-child { border-bottom: none; }

.archive-date {
    font-size: 0.85rem;
    color: #999;
    white-space: nowrap;
    min-width: 6em;
}

.archive-title {
    font-size: 1.05rem;
    font-weight: 500;
}

/* Responsive */
@media (max-width: 768px) {
    .container { padding: 1rem; }
    h1 { font-size: 1.8rem; }
    .nav-links { display: none; }
    table { font-size: 0.9rem; }
    th, td { padding: 0.75rem; }
    .resource-grid { grid-template-columns: 1fr; }
    .archive-list li { flex-direction: column; gap: 0.3rem; }
    .archive-date { min-width: auto; }
    .error-page h1 { font-size: 4rem; }
}

@media (max-width: 480px) {
    .nav-container { padding: 0.8rem 1rem; }
    .logo { font-size: 1.2rem; }
}
</style>
</head>
