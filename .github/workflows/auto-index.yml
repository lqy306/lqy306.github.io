name: Auto Build Site

on:
  push:
    # 任何推送都会触发构建
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install markdown

      - name: Generate all pages
        run: python generate_index.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add resources/**/index.html resources/index.html
          git add post/**/index.html post/index.html post/rss.xml
          git add tags/index.html tags/**/index.html
          git add sitemap.xml 404.html
          git diff --staged --quiet || git commit -m "Auto-build: regenerate site pages"
          git push
